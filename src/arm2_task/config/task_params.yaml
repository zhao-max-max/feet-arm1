---
/**:
  ros__parameters:

    # 预设动作点 (角度制)
    presets:
      load:     [0.0,  90.0, -80.0, -90.0, 0.0]   # 俯瞰姿态，相机朝正下方
      look_out: [-90.0, 90.0, -145.0, 0.0,  0.0]    # 瞭望姿态，相机朝斜下方
      reset:    [0.0, 175.0, -170.0, 10.0, 0.0]    # 收回/待机
      carry:    [0.0, 175.0, -140.0, 10.0, 0.0]    # 持箱收回姿态（带负载）

    task:
      require_payload_service: false
      require_suction_service: false
      payload_service: set_payload_state
      payload_default:
        has_load: true
        mass: 0.5
        com: [0.0, 0.0, 0.2219]
      manual_mode: true         # false = nav 触发模式（默认），true = 菜单交互模式（调试用）

    task_step6:
      grasp_pitch:       -1.57    # 抓取末端俯仰角 (rad)
      tool_pitch_offset:  0.25    # 实机 pitch 标定偏移 (rad)，正值=吸盘往前倾
      tool_yaw_offset:    0.0     # 实机 yaw 标定偏移 (rad)，正值=逆时针(从上往下看)
      object_height:      0.005   # 物体高度，决定末端 Z 落点 (m)
      pre_grasp_offset:   0.10    # 预抓取悬停高度偏移 (m)
      tool_offset_x:      0.0
      tool_offset_y:      0.0
      tool_offset_z:      0.08    # 工具坐标系偏移（补偿 base_link Z 偏置）
      tool_tip_length:    0.0     # 吸盘接触面到 Link_5 origin 的距离 (m)
      pick_object_name:  "box"    # 传给 get_pick_pos 服务的物体名
      use_mock_target:    false   # true 时 case6 用固定坐标（调试用）
      mock_x:             0.35
      mock_y:             0.0
      mock_z:             0.12

    task_place:
      pre_place_offset:   0.12    # 预放置悬停高度偏移 (m)
      retreat_offset:     0.15    # 放置后垂直后退距离 (m)

    task_place_frame:
      hover_height:       0.10
      contact_offset:     0.45
      frame_name:         "target_frame"
      roll_sign:          1.0
      use_mock_target:    false
      mock_x:             0.35
      mock_y:             0.0
      mock_z:             0.0
      mock_yaw:           0.0

    task_stack:
      hover_height:       0.05
      contact_offset:     0.25
      stack_service:      "get_stack_pos"
      roll_sign:          1.0
      use_mock_target:    false
      mock_x:             0.35
      mock_y:             0.0
      mock_z:             0.1
      mock_yaw:           0.0

    visual_align:
      align_threshold:    0.005   # Phase-2 对齐收敛阈值：末端与目标 XY 误差 (m)
      max_iters:          5       # Phase-2 最大迭代次数
